steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/new-api:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/new-api:$SHORT_SHA'
      - '.'
    dir: '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/new-api'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'new-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/new-api:$SHORT_SHA'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600'
      - '--set-env-vars'
      - 'SQL_DSN=${_SQL_DSN},REDIS_CONN_STRING=${_REDIS_CONN_STRING},SESSION_SECRET=${_SESSION_SECRET},CRYPTO_SECRET=${_CRYPTO_SECRET}'

images:
  - 'gcr.io/$PROJECT_ID/new-api:latest'
  - 'gcr.io/$PROJECT_ID/new-api:$SHORT_SHA'

substitutions:
  _SQL_DSN: ''
  _REDIS_CONN_STRING: ''
  _SESSION_SECRET: ''
  _CRYPTO_SECRET: ''

options:
  machineType: 'N1_HIGHCPU_8'
